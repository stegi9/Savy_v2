version: '3.8'

services:
  # MySQL Database (Disabled - connecting to Host XAMPP)
  # mysql:
  #   image: mysql:8.0

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: savy_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - savy_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savy_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Database
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-savy_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-savy_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-savy_db}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      
      # Google Gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      
      # Email (SendGrid/SMTP)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@savy.app}
      
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,http://10.0.2.2:8000}
      
      # Salt Edge (Bank Integration - mock for now)
      SALT_EDGE_APP_ID: ${SALT_EDGE_APP_ID:-mock}
      SALT_EDGE_SECRET: ${SALT_EDGE_SECRET:-mock}
      
      # Affiliate APIs
      AMAZON_ASSOCIATE_TAG: ${AMAZON_ASSOCIATE_TAG}
      BOOKING_AFFILIATE_ID: ${BOOKING_AFFILIATE_ID}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - savy_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (Background Jobs)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savy_celery_worker
    restart: unless-stopped
    depends_on:
      - redis
      - backend
    environment:
      # Same as backend
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-savy_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-savy_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-savy_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@savy.app}
      SENTRY_DSN: ${SENTRY_DSN}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - savy_network
    command: celery -A celery_tasks.celery_app worker --loglevel=info --concurrency=2

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: savy_celery_beat
    restart: unless-stopped
    depends_on:
      - redis
      - backend
    environment:
      # Same as backend
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - savy_network
    command: celery -A celery_tasks.celery_app beat --loglevel=info

networks:
  savy_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  backend_logs:

# Savy - Nginx Load Balancer Configuration
# Optimized for high concurrency and zero latency

# Worker processes (auto = CPU cores)
worker_processes auto;

# Max connections per worker
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # ==========================================================================
    # BASIC SETTINGS
    # ==========================================================================
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # Logging (JSON for structured logs)
    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ==========================================================================
    # PERFORMANCE OPTIMIZATION
    # ==========================================================================
    
    # Keep-alive connections
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    # Buffer sizes
    client_body_buffer_size 16k;
    client_max_body_size 10m;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 256;
    
    # TCP optimizations
    tcp_nopush on;
    tcp_nodelay on;
    
    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;  # For LLM calls that may take time

    # ==========================================================================
    # UPSTREAM (LOAD BALANCING)
    # ==========================================================================
    
    upstream api_servers {
        # Round-robin by default
        # Use least_conn for better distribution under load
        least_conn;
        
        # Docker service discovery (docker-compose service name)
        server api:8000 weight=1 max_fails=3 fail_timeout=30s;
        
        # Keep connections alive to backend
        keepalive 32;
    }

    # ==========================================================================
    # RATE LIMITING
    # ==========================================================================
    
    # Rate limit zone (10 req/s per IP for API)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Rate limit zone for chat endpoint (slower - LLM calls)
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=2r/s;

    # ==========================================================================
    # SERVER BLOCK
    # ==========================================================================
    
    server {
        listen 80;
        server_name _;

        # Health check for load balancer itself
        location /nginx-health {
            access_log off;
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # API endpoints
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            
            # Proxy to backend
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # Chat endpoint (stricter rate limit for LLM calls)
        location /api/v1/chat {
            limit_req zone=chat_limit burst=5 nodelay;
            
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_read_timeout 120s;  # LLM can be slow
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Health check passthrough
        location /health {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Root redirect
        location / {
            return 301 /api/v1/;
        }
    }

    # HTTPS server (uncomment when SSL is configured)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... same location blocks as above ...
    # }
}

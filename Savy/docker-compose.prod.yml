version: '3.8'

# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mysql:
    restart: always
    command: --default-authentication-plugin=mysql_native_password --max_connections=200

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      ENVIRONMENT: production
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
    # No volume mounts in production (code is in image)

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    command: celery -A worker.celery_app worker --loglevel=warning --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    command: celery -A worker.celery_app beat --loglevel=warning

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: savy_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/build/web:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - savy_network

# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: savy-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt  # EU region for GDPR compliance
    plan: starter  # $7/month, can upgrade to standard
    
    # Environment variables (set in Render dashboard)
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MYSQL_HOST
        sync: false  # Set manually in dashboard
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Auto-generate secure secret
      - key: GEMINI_API_KEY
        sync: false
    
    # Health check
    healthCheckPath: /health
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Build settings
    buildCommand: ""
    startCommand: ""

